<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>hermanl0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @font-face {
      font-family: 'Ubuntu Nerd Font';
      src: url('assets/fonts/UbuntuNerdFont-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    :root {
      color-scheme: dark;
      --bg: #181c20;
      --fg: #e8eaee;
      --accent: #5aa2ff;
      --accent-bg: #23304a;
      --border: #22242a;
      --tag-bg: #242831;
      --tag-fg: #9cc4ff;
      --tag-selected-bg: #5aa2ff;
      --tag-selected-fg: #181c20;
      --shadow: rgba(0,0,0,0.12);
    }
    body.light {
      --bg: #fff;
      --fg: #222;
      --accent: #0969da;
      --accent-bg: #f6f8fa;
      --border: #d0d7de;
      --tag-bg: #f6f8fa;
      --tag-fg: #0969da;
      --tag-selected-bg: #0969da;
      --tag-selected-fg: #fff;
      --shadow: rgba(0,0,0,0.06);
    }
    body {
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      font-family: 'Ubuntu Nerd Font', 'Segoe UI', system-ui, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
      transition: background 0.3s, color 0.3s;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      align-items: center;
      gap: 0.6em;
    }
    .mode-toggle {
      background: var(--accent-bg);
      color: var(--accent);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0.25em 1.1em;
      cursor: pointer;
      font-family: 'Ubuntu Nerd Font', 'Segoe UI', system-ui, sans-serif;
      font-size: 1em;
      transition: background 0.2s, color 0.2s, border 0.2s;
      margin-left: 1em;
      text-transform: lowercase;
    }
    h1 {
      font-family: 'Ubuntu Nerd Font', 'Fira Mono', 'Menlo', monospace;
      font-size: 2rem;
      margin-bottom: 0.6rem;
      margin-top: 0;
      text-transform: lowercase;
    }
    .search-bar {
      width: 100%;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 1rem;
      background: var(--tag-bg);
      color: var(--fg);
      box-sizing: border-box;
      font-family: 'Ubuntu Nerd Font', 'Segoe UI', system-ui, sans-serif;
      outline: none;
      transition: border 0.2s, background 0.2s;
      text-transform: lowercase;
    }
    .search-bar:focus {
      border: 1.5px solid var(--accent);
    }
    .tags {
      margin-bottom: 1.3rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.35em;
    }
    .tag {
      display: inline-block;
      background: var(--tag-bg);
      color: var(--tag-fg);
      border: 1px solid var(--border);
      border-radius: 2em;
      padding: 0.25em 0.85em;
      font-size: 1em;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s, color 0.15s;
      font-family: 'Ubuntu Nerd Font', 'Segoe UI', system-ui, sans-serif;
      margin-bottom: 0.15em;
      text-transform: lowercase;
    }
    .tag.selected {
      background: var(--tag-selected-bg);
      color: var(--tag-selected-fg);
      border-color: var(--tag-selected-bg);
    }
    .results {
      margin-top: 2rem;
    }
    .results details {
      background: var(--tag-bg);
      border-radius: 6px;
      margin-bottom: 1em;
      border: 1px solid var(--border);
      padding: 0.5em 0.6em;
    }
    .results summary {
      cursor: pointer;
      outline: none;
      font-weight: bold;
      font-family: inherit;
      font-size: 1.05em;
      color: var(--accent);
      margin: -0.5em -0.6em 0.4em -0.6em;
      padding: 0.5em 0.6em;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      border-radius: 6px 6px 0 0;
    }
    .results .result {
      border: none;
      padding: 0.7em 0 0.7em 1em;
    }
    .results .result:last-child {
      border: none;
    }
    .result a {
      color: var(--accent);
      font-weight: bold;
      text-decoration: none;
      font-size: 1.1rem;
      font-family: 'Ubuntu Nerd Font', 'Segoe UI', system-ui, sans-serif;
      word-break: break-all;
      text-transform: lowercase;
    }
    .result a:hover { text-decoration: underline; }
    .result p {
      color: var(--tag-fg);
      margin: 0.3em 0 0 0;
      font-size: 0.97em;
      font-family: 'Ubuntu Nerd Font', 'Segoe UI', system-ui, sans-serif;
      text-transform: lowercase;
    }
    @media (max-width: 600px) {
      body { margin: 1rem }
      .results { margin-top: 1rem }
      .topbar { flex-direction: column; gap: 1em }
      .links { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="links">
      <a class="icon-link" href="https://github.com/hermanl0/hermanl0.github.io" target="_blank" title="main_repository">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 0.3C5.37 0.3 0 5.67 0 12.29c0 5.28 3.44 9.75 8.2 11.33.6.12.82-.26.82-.58 0-.29-.01-1.05-.02-2.06-3.34.73-4.04-1.64-4.04-1.64-.55-1.4-1.34-1.78-1.34-1.78-1.1-.74.08-.73.08-.73 1.22.09 1.86 1.26 1.86 1.26 1.08 1.85 2.84 1.31 3.53 1 .11-.78.42-1.31.75-1.62-2.67-.3-5.47-1.34-5.47-5.97 0-1.32.47-2.39 1.24-3.23-.13-.3-.54-1.52.12-3.17 0 0 1.01-.32 3.3 1.23.97-.27 2-.4 3.03-.4s2.06.13 3.03.4c2.29-1.55 3.3-1.23 3.3-1.23.66 1.65.25 2.87.12 3.17.77.84 1.24 1.91 1.24 3.23 0 4.64-2.8 5.66-5.47 5.97.43.37.81 1.1.81 2.22 0 1.61-.02 2.91-.02 3.3 0 .32.22.71.83.58C20.56 22.04 24 17.57 24 12.29c0-6.62-5.37-11.99-12-11.99z"></path></svg>
        <span style="margin-left:0.2em;">main_repository</span>
      </a>
      <a class="icon-link" href="https://www.linkedin.com/in/hermanl0/" target="_blank" title="linkedin">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M19 0h-14c-2.76 0-5 2.24-5 5v14c0 2.76 2.24 5 5 5h14c2.76 0 5-2.24 5-5v-14c0-2.76-2.24-5-5-5zm-11 19h-3v-10h3v10zm-1.5-11.28c-.97 0-1.75-.79-1.75-1.75s.79-1.75 1.75-1.75 1.75.79 1.75 1.75-.78 1.75-1.75 1.75zm13.5 11.28h-3v-5.6c0-1.34-.03-3.07-1.87-3.07-1.87 0-2.16 1.46-2.16 2.97v5.7h-3v-10h2.89v1.36h.04c.4-.76 1.39-1.56 2.86-1.56 3.06 0 3.63 2.01 3.63 4.62v5.58z"></path></svg>
      </a>
    </div>
    <button class="mode-toggle" id="modeToggle">🌑 dark</button>
  </div>
  <h1>hermanl0</h1>
  <input class="search-bar" id="search" type="text" placeholder="search in content of notes and projects..." autocomplete="off">
  <div class="tags" id="tags"></div>
  <div class="results" id="results">loading...</div>
  <script>
    // ---- config ----
    const owner = "hermanl0";
    const repo = "hermanl0.github.io";
    const folders = ["00_notes", "01_projects"];

    // ---- tag definitions ----
    const tagList = [
      { tag: "dotfiles", keywords: [".nanorc", ".tmux.conf", "dotfile", "rc", "profile"] },
      { tag: "networking", keywords: ["network", "wildcard", "cisco", "bird", "mtr", "ip address", "routing", "snmp", "ntp"] },
      { tag: "linux_cli", keywords: ["bash", "shell", "linux", "command", "cli"] },
      { tag: "security", keywords: ["ssh", "key", "firewalld", "security"] },
      { tag: "version_control", keywords: ["git", "clone", "commit", "branch", "rebase"] },
      { tag: "encoding_decoding", keywords: ["base64", "encode", "decode"] },
      { tag: "automation_scripting", keywords: ["script", "powershell", "automation"] },
      { tag: "systems_administration", keywords: ["device", "environment", "snmp", "ntp", "config", "manager", "archive"] }
    ];

    function normalizeName(name) {
      return name.replace(/[\s\-]+/g, '_').toLowerCase();
    }

    // ---- theme ----
    const modeToggleBtn = document.getElementById('modeToggle');
    function setMode(light) {
      if (light) {
        document.body.classList.add('light');
        modeToggleBtn.textContent = "🌕 light";
      } else {
        document.body.classList.remove('light');
        modeToggleBtn.textContent = "🌑 dark";
      }
    }
    setMode(false);
    modeToggleBtn.onclick = () => {
      setMode(!document.body.classList.contains('light'));
    };

    // ---- state ----
    let files = [];
    let fileTags = {}; // { path: [tag] }
    let selectedTag = null;

    // ---- fetch files and contents (only in allowed folders) ----
    async function fetchAllowedFiles() {
      let allFiles = [];
      for (const folder of folders) {
        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${folder}`);
        if (res.ok) {
          const data = await res.json();
          allFiles.push(...data
            .filter(f => f.type === "file")
            .map(f => ({
              name: f.name,
              path: f.path,
              folder,
              url: f.html_url
            }))
          );
        }
      }
      return allFiles;
    }

    async function fetchFileContents(files) {
      for (const f of files) {
        const res = await fetch(`https://raw.githubusercontent.com/${owner}/${repo}/main/${f.path}`);
        if (res.ok) f.content = await res.text();
        else f.content = "";
      }
    }

    function tagFiles(files) {
      let result = {};
      for (const f of files) {
        let text = (f.name + ' ' + (f.content || '')).toLowerCase();
        const found = tagList.find(tagObj => tagObj.keywords.some(word => text.includes(word)));
        result[f.path] = found ? [found.tag] : [];
      }
      return result;
    }

    function renderTags() {
      const tagDiv = document.getElementById('tags');
      tagDiv.innerHTML = '';
      for (const tagObj of tagList) {
        const count = Object.values(fileTags).filter(tags => tags.includes(tagObj.tag)).length;
        if (count === 0) continue;
        const el = document.createElement('span');
        el.className = 'tag' + (selectedTag === tagObj.tag ? ' selected' : '');
        el.textContent = tagObj.tag + (count > 1 ? ` (${count})` : '');
        el.onclick = () => {
          selectedTag = (selectedTag === tagObj.tag) ? null : tagObj.tag;
          renderTags();
          renderResults();
        };
        tagDiv.appendChild(el);
      }
    }

    function renderResults() {
      const resDiv = document.getElementById('results');
      let filtered = files;
      const searchVal = document.getElementById('search').value.trim().toLowerCase();
      if (searchVal) {
        filtered = filtered.filter(f => (f.name + ' ' + (f.content || '')).toLowerCase().includes(searchVal));
      }
      if (selectedTag) {
        filtered = filtered.filter(f => fileTags[f.path]?.includes(selectedTag));
      }
      // group by folder
      const grouped = {};
      for (const f of filtered) {
        const key = normalizeName(f.folder);
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(f);
      }
      resDiv.innerHTML = Object.keys(grouped).sort().map(key => {
        const display = key.replace('_', ' ');
        return `
          <details>
            <summary>${display} (${grouped[key].length})</summary>
            ${grouped[key].map(f =>
              `<div class="result">
                <a href="${f.url}" target="_blank">${f.name}</a>
                <p>in <strong>${f.folder}</strong> ${fileTags[f.path]?.length ? " | tag: " + fileTags[f.path][0] : ""}</p>
              </div>`
            ).join('')}
          </details>
        `;
      }).join('');
    }

    (async function(){
      files = await fetchAllowedFiles();
      await fetchFileContents(files);
      fileTags = tagFiles(files);
      renderTags();
      renderResults();
    })();

    document.getElementById('search').addEventListener('input', renderResults);

  </script>
</body>
</html>
