<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>hermanl0.github.io</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg-light: #fff;
      --bg-dark: #181a1b;
      --text-light: #181a1b;
      --text-dark: #fff;
    }
    body {
      background: var(--bg-dark);
      color: var(--text-dark);
      margin: 0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }
    body.light {
      background: var(--bg-light);
      color: var(--text-light);
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-bottom: 1px solid #444;
    }
    .repo-link {
      text-decoration: none;
      color: inherit;
      font-weight: bold;
    }
    .mode-toggle {
      background: none;
      border: 1px solid #888;
      border-radius: 2em;
      color: inherit;
      padding: 0.5em 1.2em;
      cursor: pointer;
      font-size: 1em;
      transition: background 0.2s, color 0.2s;
    }
    main {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 70vh;
      font-size: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <a class="repo-link" href="https://github.com/hermanl0/hermanl0.github.io" target="_blank" rel="noopener">Repo</a>
    <button class="mode-toggle" id="mode-toggle">Light Mode</button>
  </header>
  <main>
    lo
  </main>
  <script>
    // Set dark mode as default
    function setMode(isDark) {
      if (isDark) {
        document.body.classList.remove('light');
        document.getElementById('mode-toggle').textContent = 'Light Mode';
        localStorage.setItem('theme', 'dark');
      } else {
        document.body.classList.add('light');
        document.getElementById('mode-toggle').textContent = 'Dark Mode';
        localStorage.setItem('theme', 'light');
      }
    }

    // Load saved theme
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
      setMode(false);
    } else {
      setMode(true);
    }

    document.getElementById('mode-toggle').addEventListener('click', () => {
      setMode(!document.body.classList.contains('light'));
    });
  </script>
</body>
</html>
