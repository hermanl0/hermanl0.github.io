<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>hermanl0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @font-face {
      font-family: 'Ubuntu Nerd Font';
      src: url('assets/fonts/UbuntuNerdFont-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    :root {
      color-scheme: dark;
      --bg: #181c20;
      --fg: #e8eaee;
      --accent: #5aa2ff;
      --accent-bg: #23304a;
      --border: #22242a;
      --tag-bg: #242831;
      --tag-fg: #9cc4ff;
      --tag-selected-bg: #5aa2ff;
      --tag-selected-fg: #181c20;
      --shadow: rgba(0,0,0,0.12);
    }
    body.light {
      --bg: #fff;
      --fg: #222;
      --accent: #0969da;
      --accent-bg: #f6f8fa;
      --border: #d0d7de;
      --tag-bg: #f6f8fa;
      --tag-fg: #0969da;
      --tag-selected-bg: #0969da;
      --tag-selected-fg: #fff;
      --shadow: rgba(0,0,0,0.06);
    }
    body {
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      font-family: 'Ubuntu Nerd Font', 'Segoe UI', system-ui, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
      transition: background 0.3s, color 0.3s;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      align-items: center;
      gap: 0.6em;
    }
    .icon-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      padding: 0.18em 0.7em 0.18em 0.45em;
      border-radius: 2em;
      background: none;
      color: var(--accent);
      border: 1.5px solid var(--accent-bg);
      font-family: inherit;
      font-weight: bold;
      font-size: 1.08em;
      transition: background 0.14s, color 0.14s, border 0.16s;
      line-height: 1.1;
      gap: 0.35em;
    }
    .icon-link:hover {
      background: var(--accent-bg);
      color: var(--accent);
      border-color: var(--accent);
      text-decoration: none;
    }
    .icon-link svg {
      width: 1.15em;
      height: 1.15em;
      vertical-align: middle;
      fill: currentColor;
      display: inline-block;
      flex-shrink: 0;
      min-width: 1.15em;
      min-height: 1.15em;
      max-width: 1.15em;
      max-height: 1.15em;
    }
    .mode-toggle {
      background: var(--accent-bg);
      color: var(--accent);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0.25em 1.1em;
      cursor: pointer;
      font-family: 'Ubuntu Nerd Font', 'Segoe UI', system-ui, sans-serif;
      font-size: 1em;
      transition: background 0.2s, color 0.2s, border 0.2s;
      margin-left: 1em;
      text-transform: lowercase;
    }
    h1 {
      font-family: 'Ubuntu Nerd Font', 'Fira Mono', 'Menlo', monospace;
      font-size: 2rem;
      margin-bottom: 0.6rem;
      margin-top: 0;
      text-transform: lowercase;
    }
    .search-bar {
      width: 100%;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 1rem;
      background: var(--tag-bg);
      color: var(--fg);
      box-sizing: border-box;
      font-family: 'Ubuntu Nerd Font', 'Segoe UI', system-ui, sans-serif;
      outline: none;
      transition: border 0.2s, background 0.2s;
      text-transform: lowercase;
    }
    .search-bar:focus {
      border: 1.5px solid var(--accent);
    }
    .tags {
      margin-bottom: 1.3rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.35em;
    }
    .tag {
      display: inline-block;
      background: var(--tag-bg);
      color: var(--tag-fg);
      border: 1px solid var(--border);
      border-radius: 2em;
      padding: 0.25em 0.85em;
      font-size: 1em;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s, color 0.15s;
      font-family: 'Ubuntu Nerd Font', 'Segoe UI', system-ui, sans-serif;
      margin-bottom: 0.15em;
      text-transform: lowercase;
    }
    .tag.selected {
      background: var(--tag-selected-bg);
      color: var(--tag-selected-fg);
      border-color: var(--tag-selected-bg);
    }
    .results {
      margin-top: 2rem;
    }
    .results details {
      background: var(--tag-bg);
      border-radius: 6px;
      margin-bottom: 1em;
      border: 1px solid var(--border);
      padding: 0.5em 0.6em;
    }
    .results summary {
      cursor: pointer;
      outline: none;
      font-weight: bold;
      font-family: inherit;
      font-size: 1.05em;
      color: var(--accent);
      margin: -0.5em -0.6em 0.4em -0.6em;
      padding: 0.5em 0.6em;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      border-radius: 6px 6px 0 0;
    }
    .results .result {
      border: none;
      padding: 0.7em 0 0.7em 1em;
    }
    .results .result:last-child {
      border: none;
    }
    .result a {
      color: var(--accent);
      font-weight: bold;
      text-decoration: none;
      font-size: 1.1rem;
      font-family: 'Ubuntu Nerd Font', 'Segoe UI', system-ui, sans-serif;
      word-break: break-all;
      text-transform: lowercase;
    }
    .result a:hover { text-decoration: underline; }
    .result p {
      color: var(--tag-fg);
      margin: 0.3em 0 0 0;
      font-size: 0.97em;
      font-family: 'Ubuntu Nerd Font', 'Segoe UI', system-ui, sans-serif;
      text-transform: lowercase;
    }
    @media (max-width: 600px) {
      body { margin: 1rem }
      .results { margin-top: 1rem }
      .topbar { flex-direction: column; gap: 1em }
      .links { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="links">
      <a class="icon-link" href="https://github.com/hermanl0/hermanl0.github.io" target="_blank" title="main_repository">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 0.3C5.37 0.3 0 5.67 0 12.29c0 5.28 3.44 9.75 8.2 11.33.6.12.82-.26.82-.58 0-.29-.01-1.05-.02-2.06-3.34.73-4.04-1[...]"/></svg>
        <span style="margin-left:0.2em;">main_repository</span>
      </a>
      <a class="icon-link" href="https://www.linkedin.com/in/hermanl0/" target="_blank" title="linkedin">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M19 0h-14c-2.76 0-5 2.24-5 5v14c0 2.76 2.24 5 5 5h14c2.76 0 5-2.24 5-5v-14c0-2.76-2.24-5-5-5zm-11 19h-3v-10h3v10zm-1[...]"/></svg>
      </a>
    </div>
    <button class="mode-toggle" id="modeToggle">🌑 dark</button>
  </div>
  <h1>hermanl0</h1>
  <input class="search-bar" id="search" type="text" placeholder="search in content of notes and projects..." autocomplete="off">
  <div class="tags" id="tags"></div>
  <div class="results" id="results">loading...</div>
  <script>
    // ---- config ----
    const owner = "hermanl0";
    const repo = "hermanl0.github.io";
    const folders = ["00_notes", "01_projects"];

    // ---- tag definitions ----
    const tagList = [
      { tag: "dotfiles", keywords: ["tmux", "nanorc", "dotfile", "config", ".tmux.conf", ".nanorc"] },
      { tag: "networking", keywords: ["network", "wildcard", "cisco", "bird", "mtr", "ip address", "routing", "snmp", "ntp"] },
      { tag: "linux_cli", keywords: ["bash", "shell", "linux", "command", "cli"] },
      { tag: "security", keywords: ["ssh", "key", "firewalld", "security"] },
      { tag: "version_control", keywords: ["git", "clone", "commit", "branch", "rebase"] },
      { tag: "encoding_decoding", keywords: ["base64", "encode", "decode"] },
      { tag: "automation_scripting", keywords: ["script", "powershell", "automation"] },
      { tag: "systems_administration", keywords: ["device", "environment", "snmp", "ntp", "config", "manager", "archive"] }
    ];

    function normalizeName(name) {
      return name.replace(/[\s\-]+/g, '_').toLowerCase();
    }

    // ---- theme ----
    const modeToggleBtn = document.getElementById('modeToggle');
    function setMode(light) {
      if (light) {
        document.body.classList.add('light');
        modeToggleBtn.textContent = "🌕 light";
      } else {
        document.body.classList.remove('light');
        modeToggleBtn.textContent = "🌑 dark";
      }
    }
    setMode(false);
    modeToggleBtn.onclick = () => {
      setMode(!document.body.classList.contains('light'));
    };

    // ---- state ----
    let files = [];
    let fileTags = {}; // { path: [tag] }
    let selectedTag = null;

    // ---- fetch files and contents (only in allowed folders) ----
    async function fetchAllowedFiles() {
      let allFiles = [];
      for (const folder of folders) {
        try {
          const url = `https://api.github.com/repos/${owner}/${repo}/contents/${folder}`;
          const res = await fetch(url);
          if (!res.ok) continue;
          const items = await res.json();
          for (const item of items) {
            if (item.type === 'file') {
              allFiles.push({
                name: item.name,
                path: item.path,
                folder: folder,
                url: `https://github.com/${owner}/${repo}/blob/main/${item.path}`,
                raw_url: item.download_url,
                content: null
              });
            }
            if (item.type === 'dir') {
              const subRes = await fetchAllowedFilesInSubDir(item.path, folder);
              allFiles = allFiles.concat(subRes);
            }
          }
        } catch (e) {}
      }
      return allFiles;
    }
    async function fetchAllowedFilesInSubDir(dirPath, folder) {
      let arr = [];
      try {
        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${dirPath}`);
        if (!res.ok) return arr;
        const items = await res.json();
        for (const item of items) {
          if (item.type === 'file') {
            arr.push({
              name: item.name,
              path: item.path,
              folder: folder,
              url: `https://github.com/${owner}/${repo}/blob/main/${item.path}`,
              raw_url: item.download_url,
              content: null
            });
          }
          if (item.type === 'dir') {
            arr = arr.concat(await fetchAllowedFilesInSubDir(item.path, folder));
          }
        }
      } catch (e) {}
      return arr;
    }

    async function fetchFileContents(fileArr) {
      for (const file of fileArr) {
        if (file.raw_url) {
          try {
            const res = await fetch(file.raw_url);
            if (res.ok) {
              file.content = await res.text();
            } else {
              file.content = '';
            }
          } catch (e) {
            file.content = '';
          }
        }
      }
    }

    function tagFiles(files) {
      const result = {};
      for (const f of files) {
        let text = (f.name + ' ' + (f.content || '')).toLowerCase();
        const found = tagList.find(tagObj => tagObj.keywords.some(word => text.includes(word)));
        result[f.path] = found ? [found.tag] : [];
      }
      return result;
    }

    function renderTags() {
      const tagDiv = document.getElementById('tags');
      tagDiv.innerHTML = '';
      for (const tagObj of tagList) {
        const count = Object.values(fileTags).filter(tags => tags.includes(tagObj.tag)).length;
        if (count === 0) continue;
        const el = document.createElement('span');
        el.className = 'tag' + (selectedTag === tagObj.tag ? ' selected' : '');
        el.textContent = tagObj.tag + (count > 1 ? ` (${count})` : '');
        el.onclick = () => {
          selectedTag = (selectedTag === tagObj.tag) ? null : tagObj.tag;
          renderTags();
          renderResults();
        };
        tagDiv.appendChild(el);
      }
    }

    function renderResults() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      let filtered = files;
      if (selectedTag) {
        filtered = filtered.filter(f => fileTags[f.path] && fileTags[f.path].includes(selectedTag));
      }
      if (q) {
        filtered = filtered.filter(f =>
          (f.name.toLowerCase().includes(q)) ||
          (f.content && f.content.toLowerCase().includes(q))
        );
      }
      // Group by folder and subfolder
      const grouped = {};
      for (const f of filtered) {
        // Group by first and second part of path
        const parts = f.path.split('/');
        const folder = parts[0];
        const subfolder = parts.length > 2 ? parts[1] : null;
        const key = subfolder ? `${folder}/${subfolder}` : folder;
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(f);
      }
      const resDiv = document.getElementById('results');
      if (filtered.length === 0) {
        resDiv.innerHTML = '<div>no results found.</div>';
        return;
      }
      resDiv.innerHTML = Object.keys(grouped).sort().map(key => {
        const display = key.replace('_', ' ');
        return `
          <details>
            <summary>${display} (${grouped[key].length})</summary>
            ${grouped[key].map(f =>
              `<div class="result">
                <a href="${f.url}" target="_blank">${f.name}</a>
                <p>in <strong>${f.folder}</strong> ${fileTags[f.path]?.length ? " | tag: " + fileTags[f.path][0] : ""}</p>
              </div>`
            ).join('')}
          </details>
        `;
      }).join('');
    }

    (async function(){
      files = await fetchAllowedFiles();
      await fetchFileContents(files);
      fileTags = tagFiles(files);
      renderTags();
      renderResults();
    })();

    document.getElementById('search').addEventListener('input', renderResults);

  </script>
</body>
</html>
